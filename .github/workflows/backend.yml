name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ["backend/**", "infra/**", ".github/workflows/backend.yml"]
  pull_request:
    branches: [main]
    paths: ["backend/**", "infra/**"]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: undertone-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        working-directory: backend
        # test_phase11_websocket_local.py is a standalone script (real local
        # sockets + moto), not a pytest suite — run separately, see its docstring.
        run: python -m pytest tests/ --ignore=tests/test_phase11_websocket_local.py -v

  deploy:
    # Only deploy on an actual push to main, not on pull requests — a PR should
    # only prove the tests pass, never touch real infrastructure.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        working-directory: backend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        working-directory: infra/scripts
        run: |
          pip install boto3
          python manage.py deploy ${{ steps.build.outputs.image_tag }}
